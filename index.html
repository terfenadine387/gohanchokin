<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="うちごはん貯金">
<title>うちごはん貯金箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F1E2;
  --paper-dot:#E7DBB9;
  --card:#FFFDF7;
  --ink:#2B2118;
  --ink-soft:#7A6C56;
  --line:#E4D6AF;
  --breakfast:#D9A441;
  --lunch:#C9702F;
  --dinner:#3A4E7A;
  --main:#3F6B4A; --main-soft:#E1EAE1;
  --side:#B8842A; --side-soft:#F1E4C6;
  --soup:#4472A8; --soup-soft:#DEE7F2;
  --other:#7A5C8A; --other-soft:#EAE1EF;
  --coin:#C08A15; --coin-dark:#8A6410;
  --danger:#B3452C;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'Noto Sans JP',sans-serif;
  color:var(--ink);
  background: radial-gradient(var(--paper-dot) 1px, transparent 1.2px) 0 0/16px 16px, var(--paper);
  min-height:100%;
}
h1,h2,h3,.brand,.stamp,.tab-label{font-family:'Zen Maru Gothic',sans-serif;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;}

.topbar{padding: calc(var(--safe-top) + 14px) 16px 10px; border-bottom: 2px solid var(--line); background: var(--paper); position: sticky; top: 0; z-index: 100;}
.brand{margin:0;font-size:19px;font-weight:900;}

main{flex:1;padding:14px 14px calc(100px + var(--safe-bottom));overflow-x:hidden;}
.view{display:none;}
.view.active{display:block;}

button{font-family:inherit;cursor:pointer;}
.btn{border:none;border-radius:12px;padding:10px 16px;font-size:14px;font-weight:700;background:var(--ink);color:#fff;}
.btn.secondary{background:var(--card);color:var(--ink);border:2px solid var(--line);}
.btn.danger{background:var(--danger);color:#fff;}
.btn.block{width:100%;}
.btn.small{padding:6px 10px;font-size:12px;border-radius:9px;}
.btn:active{transform:translateY(1px);}

input[type=text],input[type=number],input[type=url],select,textarea{
  width:100%;font-family:inherit;font-size:16px;
  color:var(--ink); border:2px solid var(--line);border-radius:10px;background:var(--card);
  padding:9px 10px;margin-top:4px;
}
textarea{resize:vertical;min-height:44px;}
label.field{display:block;font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:12px;}

.chip-row{display:flex; flex-wrap:wrap; margin-bottom:8px;}
.chip{display:inline-flex;align-items:center;padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;border:2px solid var(--line);background:var(--card);color:var(--ink-soft);margin:0 6px 6px 0;}
.chip.active{border-color:var(--ink);color:var(--ink);background:var(--paper);}

.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.month-nav .month-label{font-size:17px;font-weight:900;}
.month-nav button{background:none;border:2px solid var(--line);border-radius:99px;padding:4px 12px;font-size:15px;}
.month-total{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:10px 14px;margin:10px 0 12px;display:flex;justify-content:space-between;align-items:center;}
.month-total .num{font-size:20px;font-weight:900;color:var(--coin-dark);}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{background:var(--card);border:2px solid var(--line);border-radius:10px;min-height:64px;padding:4px 3px;position:relative;display:flex;flex-direction:column;align-items:center;}
.cal-cell.today{border-color:var(--ink); background: var(--main-soft);}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell .datenum{font-size:11px;font-weight:700;color:var(--ink-soft);align-self:flex-start;margin-left:2px;}
.stamp-row{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;}
.stamp{min-width:14px;height:14px;border-radius:50%;color:#fff;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;line-height:1;transform:rotate(-6deg);}
.stamp.breakfast{background:var(--breakfast);}
.stamp.lunch{background:var(--lunch);}
.stamp.dinner{background:var(--dinner);}

.recipe-card{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;}
.recipe-card .rname{font-size:15px;font-weight:900;margin:0 0 4px;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;margin-right:5px;}
.badge.main{background:var(--main-soft);color:var(--main);}
.badge.side{background:var(--side-soft);color:var(--side);}
.badge.soup{background:var(--soup-soft);color:var(--soup);}
.badge.other{background:var(--other-soft);color:var(--other);}
.badge.srcbadge{background:#2B2118;color:#fff;}
.tag-mini{font-size:11px;color:var(--ink-soft);margin-right:6px;}

.fab{position:fixed;bottom:calc(90px + var(--safe-bottom));right:calc((100vw - 480px)/2 + 18px);max-width:480px;background:var(--ink);color:#fff;border:none;border-radius:99px;padding:14px 22px;font-weight:900;font-size:14px;box-shadow:0 6px 14px rgba(0,0,0,.25);z-index:90;}
@media (max-width:520px){.fab{right:18px;}}

.tabbar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;display:flex;background:var(--card);border-top:2px solid var(--line);padding: 8px 2px calc(8px + var(--safe-bottom));z-index:100;}
.tab-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 1px;border-radius:12px;color:var(--ink-soft);}
.tab-btn.active{color:var(--ink);background:var(--paper);}
.tab-btn svg{width:22px;height:22px;}
.tab-label{font-size:10px;font-weight:700;}

.modal-overlay{position:fixed;inset:0;background:rgba(43,33,24,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;}
.modal-sheet{background:var(--paper);width:100%;max-width:480px;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:18px 16px calc(30px + var(--safe-bottom));animation:slideup .18s ease-out;}
@keyframes slideup{from{transform:translateY(24px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:sticky;top:0;background:var(--paper);z-index:5;}
.modal-head h2{margin:0;font-size:17px;}
.modal-close{background:none;border:none;font-size:24px;color:var(--ink-soft);padding:4px 8px;}

.meal-block{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;}
.mb-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.meal-dot{width:12px;height:12px;border-radius:50%;}
.meal-dot.breakfast{background:var(--breakfast);}
.meal-dot.lunch{background:var(--lunch);}
.meal-dot.dinner{background:var(--dinner);}
.dish-line{padding:4px 0;font-size:14px;border-bottom:1px dashed var(--line);}
.dish-row{display:flex;gap:6px;margin-top:6px;align-items:center;}
.remove-x{background:none;border:none;color:var(--danger);font-size:20px;font-weight:900;padding:0 4px;}

.ing-row{border-bottom:1px dashed var(--line);padding-bottom:10px;margin-bottom:10px;}
.ing-line1{display:flex;gap:6px;align-items:center;}
.ing-line2{display:flex;gap:6px;margin-top:6px;}
.serving-stepper{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0;}
.serving-stepper button{width:40px;height:40px;border-radius:50%;border:2px solid var(--line);background:var(--card);font-size:18px;font-weight:900;}
.snum{font-size:18px;font-weight:900;min-width:70px;text-align:center;}
.note{font-size:12px;color:var(--ink-soft);line-height:1.6;}
.rec-line{display:flex;justify-content:space-between;background:var(--card);border:2px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:6px;font-size:13px;}
.meal-tag{font-size:10px;font-weight:900;padding:2px 8px;border-radius:99px;color:#fff;margin-right:6px;}
.meal-tag.breakfast{background:var(--breakfast);}
.meal-tag.lunch{background:var(--lunch);}
.meal-tag.dinner{background:var(--dinner);}
</style>
</head>
<body>
<div id="app">
  <header class="topbar"><h1 class="brand">🍚 うちごはん貯金箱</h1></header>
  <main id="main">
    <section id="view-calendar" class="view active"></section>
    <section id="view-recipes" class="view"></section>
    <section id="view-history" class="view"></section>
    <section id="view-money" class="view"></section>
    <section id="view-settings" class="view"></section>
  </main>
  <button class="fab" id="fab-add-recipe" style="display:none;">＋ レシピを追加</button>
  <nav class="tabbar">
    <button class="tab-btn active" data-tab="calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg><span class="tab-label">カレンダー</span></button>
    <button class="tab-btn" data-tab="recipes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h11a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z"/><path d="M7 8h8M7 12h8"/></svg><span class="tab-label">レシピ</span></button>
    <button class="tab-btn" data-tab="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span class="tab-label">履歴</span></button>
    <button class="tab-btn" data-tab="money"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9 9.5c0-1.4 1.3-2.5 3-2.5s3 .9 3 2.2c0 2.8-4.2 2-4.2 5 0 1.4 1.2 2.3 2.7 2.3 1.7 0 3-1.1 3-2.5M12 5.5v13"/></svg><span class="tab-label">おこづかい</span></button>
    <button class="tab-btn" data-tab="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg><span class="tab-label">設定</span></button>
  </nav>
  <div id="modal-root"></div>
</div>

<script>
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const MEAL_LABEL = {breakfast:'朝ごはん', lunch:'昼ごはん', dinner:'夕ごはん'};
const MEAL_STAMP = {breakfast:'朝', lunch:'昼', dinner:'夜'};
const CATEGORY_LABEL = {main:'メイン', side:'副菜', soup:'汁物', other:'その他'};
const UNIT_OPTIONS = ['g','kg','ml','l','個','本','枚','束','大さじ','小さじ','カップ','少々','適量'];

let state = {
  tab:'calendar', month: new Date(),
  settings: {breakfastEarns:false, breakfastPrice:300, lunchPrice:500, dinnerPrice:500, goal:5000},
  recipes: [], records: {},
  recipeFilter: {cat:'all', q:''}, historyQuery: '',
};

async function storageGet(k, f){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : f; }catch(e){ return f; } }
async function storageSet(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ console.error(e); } }

async function loadAll(){
  state.settings = await storageGet('settings', state.settings);
  state.recipes = await storageGet('recipes', []);
  state.records = await storageGet('records', {});
}

function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function yen(n){ return (n||0).toLocaleString('ja-JP') + '円'; }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function setTab(tab){
  state.tab = tab;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('fab-add-recipe').style.display = tab==='recipes' ? 'block' : 'none';
  if(tab==='calendar') renderCalendar();
  if(tab==='recipes') renderRecipes();
  if(tab==='history') renderHistory();
  if(tab==='money') renderMoney();
  if(tab==='settings') renderSettings();
  window.scrollTo(0,0);
}
document.querySelectorAll('.tab-btn').forEach(btn=> btn.onclick = ()=>setTab(btn.dataset.tab));
document.getElementById('fab-add-recipe').onclick = ()=>openRecipeForm(null);

function showModal(html){ document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" id="modal-overlay"><div class="modal-sheet">${html}</div></div>`; document.getElementById('modal-overlay').onclick = (e)=>{ if(e.target.id==='modal-overlay') closeModal(); }; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

/* --- CALENDAR --- */
function renderCalendar(){
  const el = document.getElementById('view-calendar');
  const y = state.month.getFullYear(), m = state.month.getMonth();
  const first = new Date(y,m,1).getDay(), last = new Date(y,m+1,0).getDate();
  const today = ymd(new Date());
  let cells = '';
  for(let i=0;i<first;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=last; d++){
    const ds = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const recs = state.records[ds] || [];
    const stamps = ['breakfast','lunch','dinner'].map(ml=>{
      const r = recs.find(x=>x.meal===ml);
      return r ? `<div class="stamp ${ml}">${MEAL_STAMP[ml]}${r.dishes.length>1?r.dishes.length:''}</div>` : '';
    }).join('');
    cells += `<div class="cal-cell ${ds===today?'today':''}" data-date="${ds}"><div class="datenum">${d}</div><div class="stamp-row">${stamps}</div></div>`;
  }
  el.innerHTML = `
    <div class="month-nav"><button id="prev-m">前月</button><div class="month-label">${y}年 ${m+1}月</div><button id="next-m">次月</button></div>
    <div class="month-total"><span>今月の貯金</span><span class="num">${yen(Object.keys(state.records).reduce((t,k)=>{if(k.startsWith(y+'-'+String(m+1).padStart(2,'0')))t+=state.records[k].reduce((st,r)=>st+r.amount,0);return t;},0))}</span></div>
    <div class="cal-grid">${cells}</div>
  `;
  document.getElementById('prev-m').onclick=()=>{state.month=new Date(y,m-1,1);renderCalendar();};
  document.getElementById('next-m').onclick=()=>{state.month=new Date(y,m+1,1);renderCalendar();};
  el.querySelectorAll('.cal-cell[data-date]').forEach(c=>c.onclick=()=>openDayModal(c.dataset.date));
}

function openDayModal(ds){
  const recs = state.records[ds] || [];
  const blocks = ['breakfast','lunch','dinner'].map(ml=>{
    const r = recs.find(x=>x.meal===ml);
    const content = r ? r.dishes.map(d=>`<div class="dish-line">${esc(d.name)}</div>`).join('') : '<div class="note">未入力（お小遣いのみ記録可）</div>';
    return `<div class="meal-block">
      <div class="mb-head"><span class="meal-dot ${ml}"></span><b>${MEAL_LABEL[ml]}</b></div>
      ${content}
      <div style="margin-top:8px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; color:var(--coin-dark);">${r?yen(r.amount):''}</span>
        <button class="btn secondary small" onclick="openMealForm('${ds}','${ml}',${r?JSON.stringify(r).replace(/"/g,'&quot;'):'null'})">${r?'編集':'記録する'}</button>
      </div>
    </div>`;
  }).join('');
  showModal(`<div class="modal-head"><h2>${ds.split('-')[1]}月${ds.split('-')[2]}日のごはん</h2><button class="modal-close" onclick="closeModal()">×</button></div>${blocks}`);
}

let currentMealDishes = [];
function openMealForm(ds, meal, r){
  currentMealDishes = r ? r.dishes : [{name:''}];
  const recipeDatalist = state.recipes.map(rc=>`<option value="${esc(rc.name)}">`).join('');
  const renderDishes = () => {
    document.getElementById('mf-dishes').innerHTML = currentMealDishes.map((d,i)=>`
      <div class="dish-row">
        <input type="text" class="dish-input" placeholder="料理名（例：肉じゃが）" list="recipe-list" value="${esc(d.name)}" oninput="currentMealDishes[${i}].name=this.value">
        ${currentMealDishes.length>1?`<button class="remove-x" onclick="currentMealDishes.splice(${i},1);openMealForm('${ds}','${meal}',{amount:${document.getElementById('mf-amount').value},dishes:currentMealDishes})">×</button>`:''}
      </div>`).join('');
  };
  const amount = r ? r.amount : (meal==='breakfast'?(state.settings.breakfastEarns?state.settings.breakfastPrice:0):meal==='lunch'?state.settings.lunchPrice:state.settings.dinnerPrice);
  
  showModal(`
    <div class="modal-head"><h2>${MEAL_LABEL[meal]}を記録</h2></div>
    <datalist id="recipe-list">${recipeDatalist}</datalist>
    <div id="mf-dishes"></div>
    <button class="btn secondary small" style="margin-top:8px;" id="mf-add-dish">＋ 品数を追加</button>
    <label class="field">お小遣い（円）</label>
    <input type="number" id="mf-amount" value="${amount}">
    <div style="margin-top:20px; display:flex; gap:8px;">
      <button class="btn block" id="mf-save">保存</button>
      <button class="btn secondary block" onclick="openDayModal('${ds}')">戻る</button>
    </div>
    ${r?`<button class="btn danger small" style="margin-top:16px;" id="mf-del">この食事の記録を消す</button>`:''}
  `);
  renderDishes();
  document.getElementById('mf-add-dish').onclick = () => { currentMealDishes.push({name:''}); renderDishes(); };
  document.getElementById('mf-save').onclick = async () => {
    const dishes = currentMealDishes.filter(d=>d.name.trim()!=='');
    const newRec = { meal, amount: Number(document.getElementById('mf-amount').value), dishes: dishes.length?dishes:[{name:'(料理名なし)'}] };
    if(!state.records[ds]) state.records[ds] = [];
    state.records[ds] = state.records[ds].filter(x=>x.meal!==meal);
    state.records[ds].push(newRec);
    await storageSet('records', state.records);
    renderCalendar(); openDayModal(ds);
  };
  if(r) document.getElementById('mf-del').onclick = async () => {
    if(confirm('削除しますか？')){
      state.records[ds] = state.records[ds].filter(x=>x.meal!==meal);
      await storageSet('records', state.records);
      renderCalendar(); openDayModal(ds);
    }
  };
}

/* --- RECIPES --- */
function renderRecipes(){
  const el = document.getElementById('view-recipes');
  const filtered = state.recipes.filter(r=>{
    const q = state.recipeFilter.q.toLowerCase();
    const matchQ = r.name.toLowerCase().includes(q) || (r.tags||[]).some(t=>t.toLowerCase().includes(q));
    const matchCat = state.recipeFilter.cat === 'all' || r.category === state.recipeFilter.cat;
    return matchQ && matchCat;
  });
  el.innerHTML = `
    <div style="position:sticky; top:60px; background:var(--paper); padding-bottom:10px; z-index:10;">
      <input type="text" id="recipe-search" placeholder="料理名・食材タグで検索" value="${esc(state.recipeFilter.q)}">
      <div class="chip-row" style="margin-top:8px;">
        ${['all','main','side','soup','other'].map(c=>`<span class="chip ${state.recipeFilter.cat===c?'active':''}" onclick="state.recipeFilter.cat='${c}';renderRecipes()">${c==='all'?'すべて':CATEGORY_LABEL[c]}</span>`).join('')}
      </div>
    </div>
    <div id="recipe-list">${filtered.map(r=>`
      <div class="recipe-card" onclick="openRecipeDetail('${r.id}')">
        <div class="rname">${esc(r.name)}</div>
        <span class="badge ${r.category}">${CATEGORY_LABEL[r.category]}</span>
        <div style="margin-top:4px;">${(r.tags||[]).map(t=>`<span class="tag-mini">#${esc(t)}</span>`).join('')}</div>
      </div>`).join('')}</div>`;
  document.getElementById('recipe-search').oninput = (e)=>{ state.recipeFilter.q = e.target.value; renderRecipes(); };
}

let formIngs = [];
function openRecipeForm(rid){
  const r = rid ? state.recipes.find(x=>x.id===rid) : null;
  formIngs = r ? r.ingredients : [{name:'', amt:'', unit:''}];
  let steps = r ? r.steps : [''];

  const renderSteps = () => {
    document.getElementById('rf-steps').innerHTML = steps.map((s,i)=>`
      <div class="dish-row" style="align-items:flex-start;">
        <span style="font-size:12px; margin-top:14px; width:20px;">${i+1}</span>
        <textarea oninput="steps[${i}]=this.value">${esc(s)}</textarea>
        <button class="remove-x" onclick="steps.splice(${i},1);renderSteps()">×</button>
      </div>`).join('');
  };

  const renderIngs = () => {
    document.getElementById('rf-ings').innerHTML = formIngs.map((ing,i)=>`
      <div class="ing-row">
        <div class="ing-line1">
          <input type="text" placeholder="材料名" value="${esc(ing.name)}" oninput="formIngs[${i}].name=this.value" style="flex:1;">
          <button class="remove-x" onclick="formIngs.splice(${i},1);renderIngs()">×</button>
        </div>
        <div class="ing-line2">
          <input type="text" placeholder="量" value="${esc(ing.amt)}" oninput="formIngs[${i}].amt=this.value">
          <select onchange="formIngs[${i}].unit=this.value">
            <option value="">単位</option>
            ${UNIT_OPTIONS.map(u=>`<option value="${u}" ${ing.unit===u?'selected':''}>${u}</option>`).join('')}
            <option value="custom">自由入力</option>
          </select>
          ${ing.unit==='custom'||(!UNIT_OPTIONS.includes(ing.unit)&&ing.unit!=='')?`<input type="text" placeholder="単位" value="${esc(ing.unit==='custom'?'':ing.unit)}" oninput="formIngs[${i}].unit=this.value">`:''}
        </div>
      </div>`).join('');
  };

  showModal(`
    <div class="modal-head"><h2>${r?'レシピ編集':'レシピ追加'}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
    <label class="field">URL (TikTok/Webなど)</label>
    <input type="url" id="rf-url" value="${r?esc(r.url):''}" placeholder="https://...">
    <label class="field">キャプション・説明のメモ</label>
    <textarea id="rf-caption" placeholder="動画の説明文などを貼り付け">${r?esc(r.caption):''}</textarea>
    
    <label class="field">レシピ名</label>
    <input type="text" id="rf-name" value="${r?esc(r.name):''}">
    
    <label class="field">分類</label>
    <select id="rf-cat">
      ${Object.entries(CATEGORY_LABEL).map(([k,v])=>`<option value="${k}" ${r&&r.category===k?'selected':''}>${v}</option>`).join('')}
    </select>
    
    <label class="field">食材タグ (コンマ区切り：牛肉, 野菜など)</label>
    <input type="text" id="rf-tags" value="${r?esc(r.tags.join(', ')):''}" placeholder="鶏肉, 玉ねぎ">
    
    <label class="field">材料 (基準：<input type="number" id="rf-serv" value="${r?r.serv:2}" style="width:50px; display:inline;">人分)</label>
    <div id="rf-ings"></div>
    <button class="btn secondary small" onclick="formIngs.push({name:'',amt:'',unit:''});renderIngs()">＋ 材料追加</button>
    
    <label class="field">作り方</label>
    <div id="rf-steps"></div>
    <button class="btn secondary small" onclick="steps.push('');renderSteps()">＋ 手順追加</button>
    
    <div style="margin-top:24px; display:flex; gap:8px;">
      <button class="btn block" id="rf-save">保存</button>
      <button class="btn secondary block" onclick="closeModal()">キャンセル</button>
    </div>
  `);
  renderIngs(); renderSteps();
  document.getElementById('rf-save').onclick = async () => {
    const name = document.getElementById('rf-name').value.trim();
    if(!name) return alert('名前を入力してください');
    const newRecipe = {
      id: r?r.id:uid(), name, url: document.getElementById('rf-url').value, caption: document.getElementById('rf-caption').value,
      category: document.getElementById('rf-cat').value,
      tags: document.getElementById('rf-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
      serv: Number(document.getElementById('rf-serv').value),
      ingredients: formIngs.filter(i=>i.name), steps: steps.filter(s=>s.trim())
    };
    if(r) state.recipes = state.recipes.map(x=>x.id===r.id?newRecipe:x);
    else state.recipes.push(newRecipe);
    await storageSet('recipes', state.recipes);
    closeModal(); renderRecipes();
  };
}

function openRecipeDetail(rid){
  const r = state.recipes.find(x=>x.id===rid);
  let s = r.serv;
  const renderDetail = () => {
    const ings = r.ingredients.map(ing=>{
      const a = !isNaN(ing.amt) ? Math.round((ing.amt*(s/r.serv))*10)/10 : ing.amt;
      return `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--line); font-size:14px;"><span>${esc(ing.name)}</span><span>${a}${esc(ing.unit)}</span></div>`;
    }).join('');
    showModal(`
      <div class="modal-head"><h2>${esc(r.name)}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="chip-row">${(r.tags||[]).map(t=>`<span class="tag-mini">#${esc(t)}</span>`).join('')}</div>
      <div class="serving-stepper"><button onclick="if(s>1)s--;renderDetail()">－</button><div class="snum">${s}人分</div><button onclick="s++;renderDetail()">＋</button></div>
      <h3 style="font-size:15px; margin-bottom:8px;">材料</h3>${ings}
      <h3 style="font-size:15px; margin-top:20px; margin-bottom:8px;">作り方</h3>
      ${r.steps.map((st,i)=>`<div style="display:flex; gap:10px; margin-bottom:10px; font-size:14px;"><span style="color:var(--ink-soft); font-weight:900;">${i+1}.</span><span>${esc(st)}</span></div>`).join('')}
      ${r.caption?`<div style="margin-top:20px; padding:10px; background:#eee; border-radius:10px; font-size:12px;">${esc(r.caption)}</div>`:''}
      <div style="margin-top:24px; display:flex; gap:8px;">
        <button class="btn block" onclick="openRecipeForm('${r.id}')">編集</button>
        ${r.url?`<a href="${esc(r.url)}" target="_blank" class="btn secondary block" style="text-decoration:none; text-align:center;">元のサイト</a>`:''}
      </div>`);
  };
  renderDetail();
}

/* --- OTHERS --- */
function renderHistory(){
  const el = document.getElementById('view-history');
  let items = [];
  Object.keys(state.records).forEach(ds=>{ state.records[ds].forEach(r=>items.push({ds, ...r})); });
  items.sort((a,b)=>b.ds.localeCompare(a.ds));
  const q = state.historyQuery.toLowerCase();
  const filtered = items.filter(it=> it.dishes.some(d=>d.name.toLowerCase().includes(q)));
  el.innerHTML = `
    <input type="text" id="hist-search" placeholder="料理名で検索" value="${esc(state.historyQuery)}">
    <div style="margin-top:12px;">${filtered.map(it=>`
      <div class="rec-line"><span><span class="meal-tag ${it.meal}">${MEAL_STAMP[it.meal]}</span>${it.ds.slice(5)} ${it.dishes.map(d=>esc(d.name)).join(', ')}</span><b>${yen(it.amount)}</b></div>
    `).join('')}</div>`;
  document.getElementById('hist-search').oninput=(e)=>{state.historyQuery=e.target.value;renderHistory();};
}

function renderMoney(){
  const el = document.getElementById('view-money');
  const y = state.month.getFullYear(), m = state.month.getMonth();
  const monthTotal = Object.keys(state.records).reduce((t,k)=>{if(k.startsWith(y+'-'+String(m+1).padStart(2,'0')))t+=state.records[k].reduce((st,r)=>st+r.amount,0);return t;},0);
  const pct = Math.min(100, Math.round((monthTotal/state.settings.goal)*100));
  el.innerHTML = `
    <div style="text-align:center; padding:30px 0;">
      <svg width="120" height="120" viewBox="0 0 100 100">
        <path d="M25 30 L20 90 Q20 96 26 96 L74 96 Q80 96 80 90 L75 30 Z" fill="none" stroke="var(--ink)" stroke-width="3"/>
        <rect x="20" y="${96-(pct*0.66)}" width="60" height="${pct*0.66}" fill="var(--coin)" clip-path="inset(0 0 0 0)"/>
        <text x="50" y="65" font-size="12" text-anchor="middle" font-weight="900">${pct}%</text>
      </svg>
      <div style="margin-top:10px; font-weight:900; font-size:20px;">${yen(monthTotal)}</div>
      <div class="note">目標：${yen(state.settings.goal)}</div>
    </div>`;
}

function renderSettings(){
  const el = document.getElementById('view-settings');
  const s = state.settings;
  el.innerHTML = `
    <div class="settings-block">
      <h3>1回あたりのお小遣い</h3>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span>朝ごはんも貯金する</span>
        <input type="checkbox" id="st-br-on" ${s.breakfastEarns?'checked':''}>
      </div>
      <label class="field">朝（円）</label><input type="number" id="st-br-p" value="${s.breakfastPrice}">
      <label class="field">昼（円）</label><input type="number" id="st-lu-p" value="${s.lunchPrice}">
      <label class="field">夜（円）</label><input type="number" id="st-di-p" value="${s.dinnerPrice}">
    </div>
    <div class="settings-block">
      <h3>今月の目標金額</h3>
      <input type="number" id="st-goal" value="${s.goal}">
    </div>
    <button class="btn block" onclick="saveSettings()">設定を保存</button>`;
}
async function saveSettings(){
  state.settings = {
    breakfastEarns: document.getElementById('st-br-on').checked,
    breakfastPrice: Number(document.getElementById('st-br-p').value),
    lunchPrice: Number(document.getElementById('st-lu-p').value),
    dinnerPrice: Number(document.getElementById('st-di-p').value),
    goal: Number(document.getElementById('st-goal').value),
  };
  await storageSet('settings', state.settings);
  alert('保存しました');
}

(async function init(){ await loadAll(); renderCalendar(); })();
</script>
